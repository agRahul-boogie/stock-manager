<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container {
            max-width: 800px;
            margin-top: 50px;
        }
        .card {
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #f8f9fa;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Stock Manager</h1>
        
        <div th:if="${message}" class="alert alert-success" role="alert">
            <span th:text="${message}"></span>
        </div>
        
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <span th:text="${error}"></span>
        </div>
        
        <div class="card">
            <div class="card-header">
                Upload Excel File
            </div>
            <div class="card-body">
                <form method="POST" th:action="@{/upload}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="file" class="form-label">Select Excel File</label>
                        <input class="form-control" type="file" id="file" name="file" accept=".xlsx">
                        <div class="form-text">Upload an Excel file containing stock information.</div>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload & Process</button>
                </form>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                Batch Processing
            </div>
            <div class="card-body">
                <form method="POST" th:action="@{/process-batch}">
                    <div class="mb-3">
                        <label for="directory" class="form-label">Directory Path</label>
                        <input type="text" class="form-control" id="directory" name="directory" 
                               placeholder="Enter directory path containing Excel files">
                    </div>
                    <button type="submit" class="btn btn-secondary">Process Batch</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
