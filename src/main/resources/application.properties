# Server configuration
server.port=12000
server.address=0.0.0.0

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application-specific settings
# java.io.tmpdir is a system property that points to the default temporary directory
# On Linux/Unix: /tmp
# On Windows: C:\Users\<username>\AppData\Local\Temp
# On macOS: /var/folders/...
app.upload.dir=${java.io.tmpdir}/stock-manager/uploads
app.output.dir=${java.io.tmpdir}/stock-manager/output

# Set to true to run Excel validation on startup (for debugging purposes)
app.validate-excel=false